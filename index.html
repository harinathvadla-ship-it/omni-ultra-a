<div class="builder-section">
    <input type="text" id="newAppName" placeholder="New App Name">
    <textarea id="appGoal" placeholder="What should the new app do?"></textarea>
    <button onclick="triggerBuild()">Build & Deploy App</button>
</div>

<script>
function triggerBuild() {
    const name = document.getElementById('newAppName').value;
    const goal = document.getElementById('appGoal').value;
    
    // This sends the data to your GitHub Action/Bot
    fetch('/api/build', { 
        method: 'POST', 
        body: JSON.stringify({ name, goal }) 
    });
    alert("Agent is building your app... check GitHub in 1 minute!");
}
</script>
